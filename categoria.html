<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentos | Vertical Locações — Sua obra não para</title>
<link rel="icon" href="/assets/logo-icone.png" type="image/png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="topo">
<div class="marca">
<img src="/assets/logo-icone.png" alt="Vertical Locações">
<div class="titulos">
<span class="nome-repo">Materiais Técnicos</span>
<span class="slogan">Sua obra não para</span>
</div>
</div>
<a class="voltar" href="/">← Todas as categorias</a>
</header>

<main>
<h1 class="titulo-pagina" id="titulo-cat">Carregando...</h1>
<div id="conteudo"></div>
</main>

<footer class="rodape">
<img src="/assets/logo.png" alt="Vertical Locações">
Vertical Locações — Sua obra não para
</footer>

<script>
async function carregar() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const res = await fetch('/content/site.json');
  const dados = await res.json();
  const cat = dados.categorias.find(c => c.slug === slug);
  const titulo = document.getElementById('titulo-cat');
  const conteudo = document.getElementById('conteudo');

  if (!cat) {
    titulo.textContent = 'Categoria não encontrada';
    return;
  }

  titulo.textContent = cat.titulo;
  const docs = cat.documentos || [];

  if (docs.length === 0) {
    conteudo.innerHTML = '<div class="vazio">Nenhum documento cadastrado nesta categoria ainda.</div>';
    return;
  }

  function renderLista(lista) {
    const ul = document.createElement('ul');
    ul.className = 'lista-documentos';
    lista.forEach(doc => {
      const li = document.createElement('li');
      const link = doc.arquivo || '#';
      li.innerHTML = `
        <div class="info">
          <div class="nome-doc">${doc.titulo}</div>
          ${doc.descricao ? `<div class="desc-doc">${doc.descricao}</div>` : ''}
        </div>
        <a class="baixar" href="${link}" target="_blank" rel="noopener">Baixar</a>
      `;
      ul.appendChild(li);
    });
    return ul;
  }

  // Agrupa documentos por subcategoria, preservando a ordem de aparição.
  // Documentos sem subcategoria são exibidos soltos, sem cabeçalho de grupo.
  const grupos = [];
  const indexPorChave = new Map();
  docs.forEach(doc => {
    const chave = doc.subcategoria || '';
    if (!indexPorChave.has(chave)) {
      indexPorChave.set(chave, grupos.length);
      grupos.push({ subcategoria: doc.subcategoria || null, docs: [] });
    }
    grupos[indexPorChave.get(chave)].docs.push(doc);
  });

  grupos.forEach(grupo => {
    if (grupo.subcategoria) {
      const h2 = document.createElement('h2');
      h2.className = 'subcategoria-titulo';
      h2.textContent = grupo.subcategoria;
      conteudo.appendChild(h2);
    }
    conteudo.appendChild(renderLista(grupo.docs));
  });
}
carregar();
</script>

</body>
</html>
